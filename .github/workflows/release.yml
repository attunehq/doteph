# Build and publish eph releases to GitHub Releases.
#
# Triggered on pull requests, main pushes, manual dry runs, and version tags
# (v*). Builds binaries for all supported platforms in parallel: native macOS
# and linux-gnu-x64, plus cross-compiled linux-arm64, musl, and windows targets
# via cargo-cross. eph is pure Rust (bollard talks to Docker over a unix socket
# or a Windows named pipe, with no TLS), so every target cross-compiles with no
# system dependencies.
#
# PR/main builds are dry runs that only prove the matrix compiles. A version tag
# publishes the unsigned binaries in a GitHub Release with auto-generated notes
# (the release notes ARE the changelog).
name: Release

on:
    pull_request:
        branches: [main]
    merge_group:
        types: [checks_requested]
    push:
        branches: [main]
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Dry run (skip release creation)"
                type: boolean
                default: false

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    CARGO_HTTP_TIMEOUT: "60"
    CARGO_NET_RETRY: "10"

jobs:
    prepare:
        name: Prepare
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            tag: ${{ steps.version.outputs.tag }}
            prerelease: ${{ steps.version.outputs.prerelease }}
            publish: ${{ steps.version.outputs.publish }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Extract version from tag
              id: version
              env:
                  DRY_RUN_INPUT: ${{ inputs.dry_run || 'false' }}
                  EVENT_NAME: ${{ github.event_name }}
                  REF: ${{ github.ref }}
                  REF_NAME: ${{ github.ref_name }}
              run: |
                  PUBLISH=false

                  if [[ "$DRY_RUN_INPUT" == "true" ]]; then
                    if [[ "$REF" == refs/tags/v* ]]; then
                      TAG="$REF_NAME"
                    else
                      TAG=$(git describe --always --tags)
                    fi
                    VERSION="${TAG#v}"
                    echo "::notice::Dry run using version: $TAG"
                  elif [[ "$REF" == refs/tags/v* ]]; then
                    TAG="$REF_NAME"
                    VERSION="${TAG#v}"
                    PUBLISH=true
                  elif [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "merge_group" || "$REF" == "refs/heads/main" ]]; then
                    TAG=$(git describe --always --tags)
                    VERSION="${TAG#v}"
                    echo "::notice::Release dry run using version: $TAG"
                  else
                    echo "::error::Release workflow must be triggered by a version tag (v*) unless it is a dry run"
                    exit 1
                  fi

                  # Detect prerelease (anything with a dash after X.Y.Z, or non-semver like commit hashes)
                  if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    PRERELEASE=false
                  else
                    PRERELEASE=true
                  fi

                  {
                    echo "tag=${TAG}"
                    echo "version=${VERSION}"
                    echo "prerelease=${PRERELEASE}"
                    echo "publish=${PUBLISH}"
                  } >> "$GITHUB_OUTPUT"
                  echo "Release version: ${VERSION} (prerelease: ${PRERELEASE}, publish: ${PUBLISH})"

    build:
        name: Build ${{ matrix.target }}
        needs: prepare
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS builds (both targets on macos-latest via --target).
                    - target: x86_64-apple-darwin
                      runner: macos-latest
                      cross: false
                    - target: aarch64-apple-darwin
                      runner: macos-latest
                      cross: false

                    # Linux GNU builds.
                    - target: x86_64-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: false
                    - target: aarch64-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: true

                    # Linux musl builds (fully static).
                    - target: x86_64-unknown-linux-musl
                      runner: ubuntu-latest
                      cross: true
                    - target: aarch64-unknown-linux-musl
                      runner: ubuntu-latest
                      cross: true

                    # Windows build using cross (simpler than native MinGW setup).
                    - target: x86_64-pc-windows-gnu
                      runner: ubuntu-latest
                      cross: true

        steps:
            - uses: actions/checkout@v7

            - name: Install Rust toolchain
              run: |
                  rustup toolchain install stable
                  rustup target add ${{ matrix.target }}

            - name: Install cargo-cross
              if: matrix.cross
              uses: taiki-e/install-action@v2
              with:
                  tool: cargo-cross
                  checksum: true

            - name: Setup Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  # PRs exercise the release matrix early; main-branch dry runs
                  # warm the default-branch cache that tag releases can restore.
                  shared-key: release-${{ matrix.target }}

            # Inject the resolved version so the binary's `--version` matches the
            # tag without relying on git being present inside cross containers.
            - name: Build with cargo cross
              if: matrix.cross
              env:
                  EPH_VERSION: ${{ needs.prepare.outputs.tag }}
                  TARGET: ${{ matrix.target }}
              run: cargo cross build --target "$TARGET" --release --locked

            - name: Build native
              if: ${{ !matrix.cross }}
              env:
                  EPH_VERSION: ${{ needs.prepare.outputs.tag }}
                  TARGET: ${{ matrix.target }}
              run: cargo build --target "$TARGET" --release --locked

            - name: Package binary
              id: package
              shell: bash
              run: |
                  TARGET="${{ matrix.target }}"
                  ARCHIVE_NAME="eph-${TARGET}"
                  ARCHIVE_DIR="artifacts/${ARCHIVE_NAME}"
                  mkdir -p "${ARCHIVE_DIR}"

                  # Copy binary (Windows has .exe extension)
                  if [[ "$TARGET" == *"windows"* ]]; then
                    cp "target/${TARGET}/release/eph.exe" "${ARCHIVE_DIR}/"
                  else
                    cp "target/${TARGET}/release/eph" "${ARCHIVE_DIR}/"
                  fi

                  # Include docs and license metadata
                  cp README.md LICENSE NOTICE "${ARCHIVE_DIR}/"

                  # Create tarball
                  (cd artifacts && tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}")
                  rm -rf "${ARCHIVE_DIR}"

                  echo "archive=artifacts/${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_OUTPUT"

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: eph-${{ matrix.target }}
                  path: ${{ steps.package.outputs.archive }}
                  if-no-files-found: error
                  retention-days: 7

    release:
        name: Release
        needs: [prepare, build]
        if: needs.prepare.outputs.publish == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: artifacts
                  pattern: eph-*
                  merge-multiple: true

            - name: List artifacts
              run: ls -la "artifacts/"

            - name: Generate checksums
              working-directory: artifacts
              run: |
                  sha256sum ./*.tar.gz > checksums.txt
                  echo "Generated checksums:"
                  cat checksums.txt

            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
                  PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
                  TAG: ${{ needs.prepare.outputs.tag }}
              run: |
                  RELEASE_FLAG="--latest"
                  if [[ "$PRERELEASE" == "true" ]]; then
                    RELEASE_FLAG="--prerelease"
                  fi

                  gh release create "$TAG" \
                    --generate-notes \
                    "$RELEASE_FLAG" \
                    --title "$TAG" \
                    artifacts/*.tar.gz \
                    artifacts/checksums.txt

            - name: Write release summary
              env:
                  REPOSITORY: ${{ github.repository }}
                  TAG: ${{ needs.prepare.outputs.tag }}
              run: |
                  {
                    echo "## Released: $TAG"
                    echo ""
                    echo "Published with auto-generated release notes."
                    echo ""
                    echo "[View the release](https://github.com/${REPOSITORY}/releases/tag/${TAG})"
                    echo ""
                    echo "### Checksums"
                    echo ""
                    echo '```'
                    cat artifacts/checksums.txt
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
