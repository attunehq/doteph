name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: eph-linux-x86_64
          - os: macos-latest
            artifact: eph-macos-arm64
          - os: windows-latest
            artifact: eph-windows-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          out="dist/${{ matrix.artifact }}"
          mkdir -p "$out"
          cp README.md LICENSE NOTICE "$out/"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/release/eph.exe "$out/"
            7z a -tzip "dist/${{ matrix.artifact }}.zip" "./$out"
          else
            cp target/release/eph "$out/"
            tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C dist "${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/* --generate-notes
