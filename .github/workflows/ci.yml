name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      # Only the unit tests (--bins) run in CI. The integration tests
      # (cargo test --test integration) are skipped because they require a
      # running Docker daemon, which is not available in this CI environment.
      - name: Test
        run: cargo test --bins --verbose
