name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Build and test (with Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # ubuntu-latest runners ship a running Docker daemon, which the
      # integration tests in tests/integration.rs talk to via bollard's
      # local-defaults socket. Confirm it is reachable before testing.
      - name: Verify Docker is available
        run: docker version

      - name: Build
        run: cargo build --verbose

      # Runs everything: library unit tests, doctests, and the Docker-backed
      # integration crate. Integration tests start real containers (postgres,
      # redis, ...), so they are kept single-threaded to avoid host port and
      # resource contention.
      - name: Test
        run: cargo test --verbose -- --test-threads=1
