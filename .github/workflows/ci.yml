name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The agent skills bundled in the binary (`eph skills install`) are
      # committed under `.claude/skills/` and `.agents/skills/`. This fails the
      # build if a change edits a skill's source without re-running the install,
      # so the checked-in copies never drift from `skills/<slug>/SKILL.md`. It is
      # a deterministic, content-only lint (no Docker), so it lives in the lint
      # job rather than the Docker-backed test job.
      - name: Bundled skills are in sync
        run: cargo run --quiet -- skills check

  test:
    name: Build and test (with Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # ubuntu-latest runners ship a running Docker daemon, which the
      # integration tests in tests/integration.rs talk to via bollard's
      # local-defaults socket. Confirm it is reachable before testing.
      - name: Verify Docker is available
        run: docker version

      - name: Build
        run: cargo build --verbose

      # Runs everything: library unit tests, doctests, and the Docker-backed
      # integration crate. Integration tests start real containers (postgres,
      # redis, ...), so they are kept single-threaded to avoid host port and
      # resource contention. The heavyweight stress tests are #[ignore]'d and so
      # are skipped here; they run in the dedicated step below.
      - name: Test
        run: cargo test --verbose -- --test-threads=1

      # Heavyweight stress tests: full multi-service environments, N concurrent
      # isolated workspaces, every service source type (image/dockerfile/run/
      # compose), and real wire-protocol connectivity (SQL/RESP/HTTP) over the
      # mapped host ports. They are #[ignore]'d for local `cargo test`, so run
      # them explicitly with --ignored. Single-threaded for the same
      # port/resource-contention reason as above.
      - name: Stress tests (heavyweight, Docker)
        run: cargo test --test stress -- --ignored --test-threads=1
