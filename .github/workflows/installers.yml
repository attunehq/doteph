# Smoke-test eph installers against published GitHub Release assets.
#
# These checks run installer scripts from the checked-out workflow ref, but the
# installers intentionally download the latest published release artifact. They
# do not test installing the binary built from the same CI commit. That limitation
# is expected: installer scripts are release-facing entrypoints, and this workflow
# verifies that installer logic, platform detection, archive names, checksums,
# extraction, and the current latest release assets continue to agree.
#
# The versioned/upgrade scenarios need at least two published non-prerelease
# releases; until a second release exists they skip (a green no-op, not a
# failure). The help scenario always runs, and fresh-latest runs as soon as one
# release is published.
#
# Keep this separate from release CI because failures can be caused by published
# release state, not by the pull request being tested.
name: Installers

on:
    workflow_dispatch:
    schedule:
        - cron: "17 16 * * *"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    installers:
        name: Test ${{ matrix.platform.name }} installer (${{ matrix.scenario }})
        runs-on: ${{ matrix.platform.os }}
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - name: Linux
                      os: ubuntu-latest
                      installer: shell
                    - name: macOS
                      os: macos-15-intel
                      installer: shell
                    - name: Windows
                      os: windows-latest
                      installer: powershell
                scenario:
                    - help
                    - fresh-latest
                    - fresh-versioned
                    - upgrade-versioned

        steps:
            - uses: actions/checkout@v7

            - name: Select release versions
              id: releases
              uses: actions/github-script@v9
              with:
                  script: |
                      // Resolve the available release versions WITHOUT failing the
                      // job: scenarios that need a release (or a second release)
                      // guard on these outputs and skip when they are empty, so the
                      // `help` and `fresh-latest` scenarios still run on a repo with
                      // zero or one published release.
                      const { owner, repo } = context.repo;
                      const stripPrefix = (tag) => tag.replace(/^v/, "");

                      const releases = await github.paginate(github.rest.repos.listReleases, {
                        owner,
                        repo,
                        per_page: 100,
                      });
                      const candidates = releases
                        .filter((release) => !release.draft && !release.prerelease)
                        .sort((left, right) => new Date(right.published_at) - new Date(left.published_at));

                      const latestTag = candidates[0]?.tag_name ?? "";
                      const previous = candidates.find((release) => release.tag_name !== latestTag);

                      core.setOutput("latest_version", latestTag ? stripPrefix(latestTag) : "");
                      core.setOutput("previous_version", previous ? stripPrefix(previous.tag_name) : "");

                      if (!latestTag) {
                        core.notice("No published non-prerelease release yet; only the `help` scenario will run.");
                      } else if (!previous) {
                        core.notice(`One published release (${latestTag}); help and fresh-latest will run, versioned/upgrade scenarios will skip until a second release exists.`);
                      } else {
                        core.notice(`Selected installer versions: LATEST=${latestTag}, LATEST-1=${previous.tag_name}`);
                      }

            - name: Run shell installer
              if: matrix.platform.installer == 'shell'
              shell: bash
              env:
                  LATEST_VERSION: ${{ steps.releases.outputs.latest_version }}
                  PREVIOUS_VERSION: ${{ steps.releases.outputs.previous_version }}
              run: |
                  case "${{ matrix.scenario }}" in
                    help)
                      # Exercises -h/--help without installing.
                      bash scripts/install.sh --help | tee "$RUNNER_TEMP/eph-install-help.txt"
                      grep -q -- "--version" "$RUNNER_TEMP/eph-install-help.txt"
                      grep -q -- "--bin-dir" "$RUNNER_TEMP/eph-install-help.txt"
                      grep -q -- "--tmp-dir" "$RUNNER_TEMP/eph-install-help.txt"
                      bash scripts/install.sh -h > /dev/null
                      ;;
                    fresh-latest)
                      # Exercises a fresh install with default latest-version lookup,
                      # plus explicit --bin-dir and --tmp-dir. This is the release
                      # health case most likely to fail when the latest published
                      # release is missing assets or checksums.
                      if [[ -z "${LATEST_VERSION:-}" ]]; then
                        echo "::notice::No published release yet; skipping fresh-latest."
                        exit 0
                      fi
                      bin_dir="$RUNNER_TEMP/eph-bin-fresh-latest"
                      tmp_dir="$RUNNER_TEMP/eph-installer-fresh-latest"
                      mkdir -p "$bin_dir" "$tmp_dir"

                      bash scripts/install.sh --bin-dir "$bin_dir" --tmp-dir "$tmp_dir"
                      "$bin_dir/eph" --version
                      ;;
                    fresh-versioned)
                      # Exercises a fresh install with --version, --bin-dir, and
                      # --tmp-dir against LATEST-1, selected by CI from published
                      # GitHub Releases.
                      if [[ -z "${PREVIOUS_VERSION:-}" ]]; then
                        echo "::notice::Need a second published release; skipping fresh-versioned."
                        exit 0
                      fi
                      bin_dir="$RUNNER_TEMP/eph-bin-fresh-versioned"
                      tmp_dir="$RUNNER_TEMP/eph-installer-fresh-versioned"
                      mkdir -p "$bin_dir" "$tmp_dir"

                      bash scripts/install.sh \
                        --version "$PREVIOUS_VERSION" \
                        --bin-dir "$bin_dir" \
                        --tmp-dir "$tmp_dir"
                      "$bin_dir/eph" --version | grep -q "v$PREVIOUS_VERSION"
                      ;;
                    upgrade-versioned)
                      # Exercises the upgrade path by installing LATEST-1, then
                      # installing LATEST into the same --bin-dir. CI owns the
                      # release selection; the installer remains generic.
                      if [[ -z "${PREVIOUS_VERSION:-}" || -z "${LATEST_VERSION:-}" ]]; then
                        echo "::notice::Need two published releases; skipping upgrade-versioned."
                        exit 0
                      fi
                      bin_dir="$RUNNER_TEMP/eph-bin-upgrade"
                      tmp_dir="$RUNNER_TEMP/eph-installer-upgrade"
                      mkdir -p "$bin_dir" "$tmp_dir"

                      bash scripts/install.sh \
                        -v "$PREVIOUS_VERSION" \
                        -b "$bin_dir" \
                        -t "$tmp_dir"
                      "$bin_dir/eph" --version | grep -q "v$PREVIOUS_VERSION"

                      bash scripts/install.sh \
                        -v "$LATEST_VERSION" \
                        -b "$bin_dir" \
                        -t "$tmp_dir"
                      "$bin_dir/eph" --version | grep -q "v$LATEST_VERSION"
                      ;;
                    *)
                      echo "Unknown installer scenario: ${{ matrix.scenario }}" >&2
                      exit 1
                      ;;
                  esac

            - name: Run PowerShell installer
              if: matrix.platform.installer == 'powershell'
              shell: pwsh
              env:
                  LATEST_VERSION: ${{ steps.releases.outputs.latest_version }}
                  PREVIOUS_VERSION: ${{ steps.releases.outputs.previous_version }}
              run: |
                  switch ("${{ matrix.scenario }}") {
                      "help" {
                          # Exercises -Help without installing.
                          $help = ./scripts/install.ps1 -Help | Out-String
                          $help | Write-Host
                          if ($help -notmatch "Version" -or $help -notmatch "BinDir" -or $help -notmatch "Help") {
                              throw "Installer help did not list expected options"
                          }
                      }
                      "fresh-latest" {
                          # Exercises a fresh install with default latest-version lookup,
                          # plus explicit -BinDir. This is the release health case most
                          # likely to fail when the latest published release is missing
                          # assets or checksums.
                          if ([string]::IsNullOrEmpty($env:LATEST_VERSION)) {
                              Write-Host "::notice::No published release yet; skipping fresh-latest."
                              exit 0
                          }
                          $binDir = Join-Path $env:RUNNER_TEMP "eph-bin-fresh-latest"

                          ./scripts/install.ps1 -BinDir $binDir
                          & (Join-Path $binDir "eph.exe") --version
                      }
                      "fresh-versioned" {
                          # Exercises a fresh install with -Version and -BinDir against
                          # LATEST-1, selected by CI from published GitHub Releases.
                          if ([string]::IsNullOrEmpty($env:PREVIOUS_VERSION)) {
                              Write-Host "::notice::Need a second published release; skipping fresh-versioned."
                              exit 0
                          }
                          $binDir = Join-Path $env:RUNNER_TEMP "eph-bin-fresh-versioned"

                          ./scripts/install.ps1 -Version $env:PREVIOUS_VERSION -BinDir $binDir
                          $version = & (Join-Path $binDir "eph.exe") --version
                          if ($version -notmatch "v$env:PREVIOUS_VERSION") {
                              throw "Expected v$env:PREVIOUS_VERSION, got $version"
                          }
                      }
                      "upgrade-versioned" {
                          # Exercises the upgrade path by installing LATEST-1, then
                          # installing LATEST into the same -BinDir. CI owns the
                          # release selection; the installer remains generic.
                          if ([string]::IsNullOrEmpty($env:PREVIOUS_VERSION) -or [string]::IsNullOrEmpty($env:LATEST_VERSION)) {
                              Write-Host "::notice::Need two published releases; skipping upgrade-versioned."
                              exit 0
                          }
                          $binDir = Join-Path $env:RUNNER_TEMP "eph-bin-upgrade"

                          ./scripts/install.ps1 -Version $env:PREVIOUS_VERSION -BinDir $binDir
                          $oldVersion = & (Join-Path $binDir "eph.exe") --version
                          if ($oldVersion -notmatch "v$env:PREVIOUS_VERSION") {
                              throw "Expected v$env:PREVIOUS_VERSION, got $oldVersion"
                          }

                          ./scripts/install.ps1 -Version $env:LATEST_VERSION -BinDir $binDir
                          $newVersion = & (Join-Path $binDir "eph.exe") --version
                          if ($newVersion -notmatch "v$env:LATEST_VERSION") {
                              throw "Expected v$env:LATEST_VERSION, got $newVersion"
                          }
                      }
                      default {
                          throw "Unknown installer scenario: ${{ matrix.scenario }}"
                      }
                  }
